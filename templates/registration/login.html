<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Cashback System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">

        <div class="card shadow-sm border-0" style="width: 420px;">

            <div class="card-body p-4">

                <div class="text-center mb-4">

                    <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width: 64px; height: 64px;">
                        <i class="bi bi-cash-coin fs-3"></i>
                    </div>

                    <h4 class="mb-1">
                        Cashback System
                    </h4>

                    <p class="text-muted mb-0">
                        Acesse sua conta para continuar
                    </p>

                </div>

                {% if form.errors %}
                <div class="alert alert-danger">
                    Usuário ou senha inválidos.
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" for="id_username">
                            Usuário
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>

                            <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username"
                                maxlength="150" class="form-control" required id="id_username">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_password">
                            Senha
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>

                            <input type="password" name="password" autocomplete="current-password" class="form-control"
                                required id="id_password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>
                        Entrar
                    </button>

                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">
                        Ambiente seguro da plataforma
                    </small>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
