{% if campo.field.widget.input_type == 'checkbox' %}
    {% include "partials/form_checkbox.html" with campo=campo %}
{% else %}
<div>
    {{ campo.label_tag }}
    {{ campo }}

    {% if campo.help_text %}
    <div class="form-text">
        {{ campo.help_text }}
    </div>
    {% endif %}

    {% for erro in campo.errors %}
    <div class="text-danger small">
        {{ erro }}
    </div>
    {% endfor %}
</div>
{% endif %}
