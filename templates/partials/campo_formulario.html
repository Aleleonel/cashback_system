{% if campo.field.widget.input_type == 'checkbox' %}
    {% include "partials/form_checkbox.html" with campo=campo %}
{% else %}
<div>
    <label
        for="{{ campo.id_for_label }}"
        class="form-label fw-semibold"
    >
        {{ campo.label }}
    </label>

    {{ campo }}

    {% if campo.help_text %}
    <div class="form-text">
        {{ campo.help_text }}
    </div>
    {% endif %}

    {% for erro in campo.errors %}
    <div class="text-danger small mt-1">
        {{ erro }}
    </div>
    {% endfor %}
</div>
{% endif %}
