{% extends 'base.html' %}

{% block content %}

<div class="container-fluid py-4">

    <div class="card shadow-sm">

        <div class="card-header">
            <strong>Clientes</strong>
        </div>

        <div class="table-responsive">

            <table class="table table-striped table-hover mb-0">

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody>

                    {% for cliente in clientes %}

                    <tr>

                        <td>{{ cliente.nome }}</td>
                        <td>{{ cliente.cpf }}</td>
                        <td>{{ cliente.telefone }}</td>

                        <td width="120">

                            <a href="{% url 'clientes:extrato_cliente' cliente.id %}" class="btn btn-sm btn-dark">

                                Extrato

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
